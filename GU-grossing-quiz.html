<style>

  @media (prefers-color-scheme: light){:root{--bg:#f6f7f9;--card:#fff;--line:#e3e6ea;--txt:#1c2128;--sub:#5b6472;--accent:#2563eb;--good:#147a45;--goodbg:#e7f6ee;--bad:#b91c1c;--badbg:#fdeaea;--chip:#eef1f5;--hdr:#eaeefb;}}
  *{box-sizing:border-box}

  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .tab{border:1px solid var(--line);background:var(--chip);color:var(--txt);padding:7px 12px;border-radius:999px;font-size:13px;cursor:pointer}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .score{position:sticky;top:0;background:var(--bg);padding:10px 0;color:var(--sub);font-size:13px;z-index:4;border-bottom:1px solid var(--line)}
  .score b{color:var(--txt)}
  .theme{background:var(--hdr);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin:18px 0 12px;font-weight:700;font-size:14px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 6px;margin-bottom:14px}
  .qtxt{font-weight:600;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:transparent;color:var(--txt);padding:11px 13px;border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:var(--goodbg);border-color:var(--good)}
  .opt.wrong{background:var(--badbg);border-color:var(--bad)}
  .opt:disabled{cursor:default}
  .exp{font-size:13px;color:var(--sub);border-top:1px dashed var(--line);margin-top:4px;padding:10px 0;display:none}
  .exp.show{display:block}
  .exp b{color:var(--txt)}
  .controls{display:flex;gap:10px;margin:6px 0 4px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:var(--chip);color:var(--txt);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px}
  .btn.lang{border-color:var(--accent);color:var(--accent);font-weight:700}
  .foot{color:var(--sub);font-size:12px;margin-top:24px;border-top:1px solid var(--line);padding-top:12px}

"Prostate":[
 Qi("s1",2,"암 치료 목적이며 유일하게 pT·margin을 매기는 전립선 표본은?",["TURP","Suprapubic (simple) prostatectomy","Radical prostatectomy","Needle biopsy"],"radical만 통째 절제(암)→pT·margin. ①TURP·②suprapubic=BPH(우연암 %만, 병기X), ④needle=진단 코어(임상병기만).","Which prostate specimen is for cancer and the only one staged (pT) with margins?",["TURP","Suprapubic (simple) prostatectomy","Radical prostatectomy","Needle biopsy"],"Only radical removes the whole gland→pT/margins. ① TURP & ② suprapubic are BPH (incidental cancer %, not staged), ④ needle is a diagnostic core (clinical stage only)."),
 Qi("s1",3,"major component 짝이 틀린 것은?",["Radical = 전립선 전체 + 양측 SV + VD","Suprapubic = transition zone adenoma 덩어리","TURP = 경요도 chips","Needle bx = 전립선 전체"],"needle=가는 코어(전체 아님). ①②③ 옳음 — radical만 SV·VD 포함, suprapubic은 안쪽 adenoma, TURP는 chips.","Which 'major component' pairing is INCORRECT?",["Radical = entire prostate + both SVs + VD","Suprapubic = transition-zone adenoma nodule","TURP = transurethral chips","Needle bx = entire prostate"],"A needle biopsy is thin cores, not the whole gland. ①②③ are correct — only radical includes SV/VD, suprapubic enucleates the inner adenoma, TURP yields chips."),
 Qi("s1",0,"Suprapubic vs TURP (둘 다 BPH) 차이는?",["Suprapubic=open 핵출(큰 샘) / TURP=경요도 chips","Suprapubic이 암 수술","TURP가 전체절제","동일"],"접근법만 다름. ②suprapubic도 BPH(암 아님), ③TURP는 깎을 뿐(전체절제=radical), ④형태 다름. 둘 다 우연암 cT1a/b.","Suprapubic vs TURP (both for BPH) — the key difference?",["Suprapubic = open enucleation (large glands) / TURP = transurethral chips","Suprapubic is a cancer operation","TURP is a total resection","Identical"],"Same target, different access. ② suprapubic is also BPH, ③ TURP only shaves (total resection = radical), ④ forms differ. Both report incidental cancer as cT1a/b."),
 Qi("s2",1,"Apex margin을 en face 대신 perpendicular cone 'on edge'로 내는 이유?",["빨라서","종양–잉크 거리(true margin) 측정","조직 많아서","고정 잘돼서"],"수직이라야 종양–잉크 거리 정량. ①속도·③조직량·④고정 무관 — en face는 표면만 봐 거리 상실. apex=margin 양성 1순위.","Why take the apical margin as a perpendicular cone 'on edge' (not an en face shave)?",["Faster","To measure tumor-to-ink distance (true margin)","More tissue","Better fixation"],"Perpendicular quantifies tumor-to-ink distance. ① speed, ③ tissue amount, ④ fixation are irrelevant — an en face shave shows only the surface. The apex is the #1 positive-margin site."),
 Qi("s2",1,"잉크 R=green / L=black, 2색 쓰는 이유?",["전통","margin 양성의 좌우(측면) 구분","고정","등급"],"색으로 어느 쪽 margin인지 즉시 앎(신경보존). ①전통 아님, ③고정·④등급 무관.","Right=green / Left=black — why two colors?",["Tradition","To identify laterality (R vs L) of a positive margin","Fixation","Grading"],"Color shows which side a positive margin is on (nerve-sparing). ① not tradition, ③ fixation & ④ grade unrelated."),
 Qi("s2",1,"자르기 전 3–4h 고정 이유?",["무게 측정","굳어야 얇은 절편·잉크 고정·margin 평가","색 보존","염색"],"물렁하면 으스러져 margin 평가 불가. ①무게는 고정 전, ③색·④염색은 목적/이후 단계.","Why fix 3–4 h before sectioning?",["To weigh","Firm tissue → thin sections, set ink, readable margin","Preserve color","Staining"],"Soft tissue crumbles, ruining the margin. ① weight is pre-fixation, ③ color & ④ staining are not the reason."),
 Qi("s2",1,"Radical에서 SV/VD는 어느 부분을 submit?",["distal 끝","proximal(접합부) — SV 침범=pT3b","중간","안 냄"],"SV 침범은 근위 muscular wall=pT3b. ①distal은 staging 부위 놓침, ③중간 비표준, ④반드시 제출.","In a radical prostatectomy, which part of SV/VD is submitted?",["Distal tip","Proximal (junction) — SV invasion = pT3b","Middle","Not submitted"],"SV invasion is at the proximal muscular wall = pT3b. ① distal misses it, ③ middle isn't standard, ④ must be submitted."),
 Qi("s2",3,"Radical에서 따로 떠야 하는 margin이 아닌 것은?",["Apical (distal urethral)","Bladder neck / base","SV/VD margin","Deep parenchymal margin"],"deep parenchymal=partial nephrectomy 개념. ①②③은 실제 전립선 margin(양끝+SV/VD).","Which is NOT a prostate margin submitted in a radical prostatectomy?",["Apical (distal urethral)","Bladder neck / base","SV/VD margin","Deep parenchymal margin"],"Deep parenchymal margin is a partial-nephrectomy concept. ①②③ are real prostate margins (the two ends + SV/VD)."),
 Qi("s2",2,"pT2(organ-confined)인데 margin 양성이면?",["자동 pT3","EPE 의미","capsular incision = pT2 + margin 양성(R1)","LN 전이"],"margin≠EPE≠pT 3축 독립. ①margin이 병기 안 올림, ②EPE는 전립선 밖(별개), ④LN 무관.","A pT2 prostatectomy with a positive margin means?",["Automatically pT3","Means EPE","Capsular incision → pT2 with positive margin (R1)","Nodal spread"],"Margin ≠ EPE ≠ pT (independent axes). ① margin doesn't raise stage, ② EPE is beyond the prostate, ④ unrelated to nodes."),
 Qi("s3",0,"본체 제출 — representative vs entire?",["<65g → entire(quadrisect) / >65g → alternating(representative)+육안종양","항상 representative","항상 entire","무게 무관"],"작으면 통째(가장 철저, 암 육안X)/크면 격번. ②항상 rep면 작은 샘 미세암 놓침, ③항상 entire면 큰 샘 비현실, ④무게가 분기.","Body of gland — representative vs entire?",["<65 g → entire (quadrisect) / >65 g → alternating + all gross tumor","Always representative","Always entire","Weight irrelevant"],"Small = entire (most thorough; cancer often invisible); large = alternating. ② always-rep misses small foci, ③ always-entire is impractical, ④ weight is the threshold."),
 Qi("s3",1,"Suprapubic prostatectomy submit 방식은?",["entire","representative — lobe당 3개, 총 6 cassette","chips 전부","margin만"],"핵출 adenoma에서 우연암 검출용 대표. ①entire 과함, ③'chips 전부'는 TURP, ④margin 없음(핵출물).","How is a suprapubic prostatectomy submitted?",["Entirely","Representative — 3 per lobe, 6 total","All chips","Margins only"],"Representative sampling for incidental cancer. ① entire is overkill, ③ 'all chips' is TURP, ④ no resection margin on an enucleated nodule."),
 Qi("s3",0,"TURP submit 원칙은?",["5 cassette까지 전부, 안 들어가면 % dictate, H&E 1장","entire + quadrisect","margin","level 3장"],"②entire+quadrisect=radical, ③TURP margin 없음, ④3 levels=needle. TURP=1 H&E(양성·조직 多).","TURP submission rule?",["All up to 5 cassettes, dictate % if it doesn't fit, one H&E","Entire + quadrisect","Margins","3 levels"],"② entire+quadrisect = radical, ③ TURP has no margin, ④ 3 levels = needle. TURP = one H&E (benign, abundant)."),
 Qi("s4",1,"전립선 단면에서 carcinoma를 시사하는 육안 소견은?",["균일한 분홍 실질","chalky yellow-white firm 부위","경계 좋은 고무질 결절","단순 낭"],"암은 대개 육안X, 보이면 chalky yellow-white firm. ①균일=정상, ③고무질 결절=BPH(전이대), ④낭=양성.","Which gross finding suggests prostate carcinoma?",["Uniform pink parenchyma","A chalky yellow-white firm area","A rubbery well-circumscribed nodule","A simple cyst"],"Cancer is usually invisible; when seen it is chalky yellow-white & firm. ① uniform pink = normal, ③ rubbery nodule = BPH, ④ cyst = benign."),
 Qi("s5",2,"pT3b를 정의하는 것은?",["EPE","Bladder neck","Seminal vesicle(근위 muscular wall) 침범","margin 양성"],"①EPE·②bladder neck(현미경)=pT3a, ④margin=R(병기X). SV 침범이 예후 나빠 상위 tier.","What defines pT3b?",["EPE","Bladder neck","Seminal vesicle (proximal muscular wall) invasion","Positive margin"],"① EPE & ② microscopic bladder neck = pT3a, ④ margin = R (not stage). SV invasion is worse → higher tier."),
 Qi("s5",1,"EPE 또는 (현미경적) bladder neck 침범 = ?",["pT2","pT3a","pT3b","pT4"],"①pT2=국한, ③pT3b=SV, ④pT4=인접장기. 현미경적 neck=pT3a.","EPE or microscopic bladder neck invasion = ?",["pT2","pT3a","pT3b","pT4"],"① pT2 = confined, ③ pT3b = SV, ④ pT4 = adjacent organ. Microscopic neck = pT3a."),
 Qi("s5",3,"rectum·levator·pelvic wall 침범/고정 = ?",["pT2","pT3a","pT3b","pT4"],"인접장기 침범=최고 국소병기. ①confined·②EPE·③SV는 그보다 낮음.","Invasion/fixation to rectum, levator, pelvic wall = ?",["pT2","pT3a","pT3b","pT4"],"Adjacent-organ invasion = highest local stage. ① confined, ② EPE, ③ SV are lower."),
 Qi("s5",2,"AJCC 8판에서 pT2를 a/b/c로 세분?",["엽별로","크기로","아니오 — pT2 단일","고등급만"],"①②는 옛 세분(엽·부피, 예후 독립성 없어 폐지), ④등급은 별도(Grade Group).","Does AJCC 8th subdivide pT2 (a/b/c)?",["By lobe","By size","No — single category","Only high grade"],"① and ② are the old subdivisions (dropped, not prognostic); ④ grade is separate (Grade Group).")
],
"Testis":[
 Qi("s1",0,"Radical orchiectomy vs simple orchiectomy 적응증 차이?",["Radical=종양(서혜부 접근) / Simple=염전·경색","Radical=양성","동일","Simple이 종양"],"radical=종양, simple=torsion/infarction. 단 GCT가 염전 유발 가능→simple도 꼼꼼히. ②radical은 암.","Radical vs simple orchiectomy — indication?",["Radical = tumor (inguinal) / Simple = torsion·infarction","Radical = benign","Identical","Simple = tumor"],"Radical for tumor, simple for torsion/infarction; a GCT can cause torsion, so examine a simple one carefully too. ② radical is for cancer."),
 Qi("s1",1,"고환 종양을 trans-scrotal 생검 대신 radical inguinal orchiectomy로 떼는 이유?",["미용","음낭 오염·림프 배액 변화 방지","저렴","조직 多"],"경음낭은 음낭 seeding·배액(음낭 vs 후복막) 변화→병기·전파 바꿈. inguinal=정삭 고위결찰로 배액 통제.","Why remove a testis tumor by radical inguinal orchiectomy (not trans-scrotal biopsy)?",["Cosmetic","Avoid scrotal contamination & altered lymphatic drainage","Cheaper","More tissue"],"Trans-scrotal seeds the scrotum and changes drainage (scrotal vs retroperitoneal). Inguinal high cord ligation controls the drainage route."),
 Qi("s2",1,"Radical orchiectomy의 핵심 margin은?",["Tunica albuginea","Proximal spermatic cord margin","Epididymis","Rete testis"],"정삭=종양 탈출 통로. cord 침범=pT3, 양성이면 잔존. ①③④는 margin 아님(침윤 평가 부위).","The critical margin in a radical orchiectomy?",["Tunica albuginea","Proximal spermatic cord margin","Epididymis","Rete testis"],"The cord is the tumor's exit route. Cord invasion = pT3; a positive cord margin = residual. ①③④ are not margins."),
 Qi("s2",1,"Vas deferens를 다시 펴서 cord margin에 포함하는 이유?",["가장 큰 구조","잘리면 retract되어 margin 단면에서 빠짐","무게","고정"],"정관 retract→단면 누락 쉬움. cord margin은 모든 내용물 대표해야.","Why re-stretch the vas to include it in the cord margin?",["Largest structure","It retracts and is missed in the margin face","Weight","Fixation"],"The vas retracts and can be excluded from the margin face — the cord margin must represent all contents."),
 Qi("s2",1,"고환을 전면(부고환 반대)에서 부고환에 평행하게 이등분하는 이유?",["무작위","부고환=후방 → 한 평면에 종양 관계 노출","정삭 찾기","고정"],"부고환 후방. 전면 평행 이등분→종양 범위 깔끔히, 부고환·hilum 안 끊음.","Why bisect from the anterior side, parallel to the epididymis?",["Random","Epididymis is posterior → clean plane shows tumor relationships","To find the cord","Fixation"],"Epididymis is posterior; cutting from the front opens the testis in one plane without transecting the epididymis/hilum."),
 Qi("s2",1,"고환 종양에서 LVI는 어디서 평가?",["종양 중심","종양 바깥(peritumoral) 혈관","부고환만","cord margin"],"종양 내 혈관강=인공물 위양성 흔함→종양–정상 경계 절편 필요. LVI=pT2.","Where is LVI assessed in a testis tumor?",["Tumor center","Vessels OUTSIDE the tumor (peritumoral)","Epididymis only","Cord margin"],"Intratumoral vessels often have artifactual cells (false-positive) → need the tumor–normal interface. LVI = pT2."),
 Qi("s3",1,"고환 종양 제출 방식은?",["종양 전체(entire) 통째","대표 ~1 cassette/cm(4–10) + 다른 부위·경계 다","1개만","margin만"],"대표 ~1/cm + 육안 다른 부위·종양-정상 경계·괴사 경계. entire는 큰 종양 비현실, 1개는 mixed GCT·LVI 놓침.","How is a testis tumor submitted?",["Entirely","Representative ~1 cassette/cm (4–10) + all different areas/interfaces","Just one","Margins only"],"Representative ~1/cm plus every different area, the tumor–normal interface, and necrosis edges. Entire is impractical; one block misses mixed GCT/LVI."),
 Qi("s4",0,"균일한 cream/tan, 분엽상, 무른(fleshy) 종양 →?",["Seminoma","Embryonal carcinoma","Teratoma","Choriocarcinoma"],"Seminoma=단일 세포 분화X→균일·분엽. ②embryonal=출혈·괴사·잡색, ③teratoma=낭·연골, ④chorio=출혈성.","Homogeneous cream/tan, lobulated, soft (fleshy) →?",["Seminoma","Embryonal carcinoma","Teratoma","Choriocarcinoma"],"Seminoma = one uniform cell type → homogeneous, lobulated. ② embryonal = necrotic/hemorrhagic/variegated, ③ teratoma = cystic/cartilage, ④ chorio = hemorrhagic."),
 Qi("s4",1,"출혈+괴사 많고 variegated →?",["Seminoma","Embryonal carcinoma","Yolk sac tumor","Teratoma"],"Embryonal=원시·고증식→괴사·출혈. ①seminoma 균일, ③yolk sac 젤라틴, ④teratoma 낭·연골.","Hemorrhagic + necrotic, variegated →?",["Seminoma","Embryonal carcinoma","Yolk sac tumor","Teratoma"],"Embryonal CA = primitive, high-grade → necrosis/hemorrhage. ① seminoma uniform, ③ yolk sac gelatinous, ④ teratoma cystic/cartilage."),
 Qi("s4",2,"낭(cyst)·연골(cartilage)이 보이는 이질적 종양 →?",["Choriocarcinoma","Yolk sac tumor","Teratoma","Seminoma"],"Teratoma=체세포 3배엽 분화(진짜 조직)→낭·연골. ①chorio 출혈, ②yolk sac 점액, ④seminoma 균일.","Cystic with cartilage, heterogeneous →?",["Choriocarcinoma","Yolk sac tumor","Teratoma","Seminoma"],"Teratoma = somatic 3-germ-layer differentiation (real tissues) → cysts/cartilage. ① chorio hemorrhagic, ② yolk sac mucoid, ④ seminoma uniform."),
 Qi("s4",1,"Mucoid/gelatinous 단면 (AFP↑) →?",["Seminoma","Yolk sac tumor","Teratoma","Choriocarcinoma"],"Yolk sac=느슨한 myxoid 배외막 기질→젤라틴, AFP. ①seminoma 균일, ③teratoma 낭·연골, ④chorio 출혈.","Mucoid/gelatinous cut surface (AFP↑) →?",["Seminoma","Yolk sac tumor","Teratoma","Choriocarcinoma"],"Yolk sac tumor = loose myxoid extraembryonic matrix → gelatinous, AFP. ① seminoma uniform, ③ teratoma cystic/cartilage, ④ chorio hemorrhagic."),
 Qi("s4",2,"거의 피떡(hemorrhagic), viable는 가장자리만, hCG↑ →?",["Seminoma","Teratoma","Choriocarcinoma","Yolk sac tumor"],"Choriocarcinoma=태반 trophoblast(혈관침습)→출혈, hCG. ①seminoma 균일, ②teratoma 낭·연골, ④yolk sac 점액·AFP.","Mostly hemorrhagic (viable at rim), hCG↑ →?",["Seminoma","Teratoma","Choriocarcinoma","Yolk sac tumor"],"Choriocarcinoma = placental trophoblast (angioinvasive) → hemorrhage, hCG. ① seminoma uniform, ② teratoma cystic/cartilage, ④ yolk sac mucoid/AFP."),
 Qi("s5",1,"고환 국한(rete 포함) + LVI 없음 = ?",["pTis","pT1","pT2","pT3"],"pT1(seminoma <3cm=1a/≥3cm=1b). ①pTis=GCNIS, ③pT2=LVI/hilar/vaginalis, ④pT3=cord.","Confined to testis (incl rete) without LVI = ?",["pTis","pT1","pT2","pT3"],"pT1 (seminoma <3cm = 1a / ≥3cm = 1b). ① pTis = GCNIS, ③ pT2 = LVI/hilar/vaginalis, ④ pT3 = cord."),
 Qi("s5",1,"LVI, 또는 hilar 연조직·epididymis, 또는 tunica vaginalis 관통 = ?",["pT1","pT2","pT3","pT4"],"pT2. ①pT1=국한+LVI없음, ③pT3=cord, ④pT4=scrotum.","LVI, OR hilar soft tissue/epididymis, OR tunica vaginalis penetration = ?",["pT1","pT2","pT3","pT4"],"pT2. ① pT1 = confined w/o LVI, ③ pT3 = cord, ④ pT4 = scrotum."),
 Qi("s5",1,"정삭 침범 = ? / 음낭 침범 = ?",["pT2 / pT3","pT3 / pT4","pT1 / pT2","pT4 / pTis"],"cord=pT3, scrotum=pT4 — 탈출 거리 따라 상승.","Spermatic cord = ? / scrotum = ?",["pT2 / pT3","pT3 / pT4","pT1 / pT2","pT4 / pTis"],"Cord = pT3, scrotum = pT4 — climbing with distance of escape.")
],
"Kidney":[
 Qi("s1",2,"신우/요관의 urothelial carcinoma 수술은?",["Radical nephrectomy","Partial nephrectomy","Radical nephroureterectomy (+요관 전체+bladder cuff)","Simple nephrectomy"],"urothelial=점막 multifocal→요관 전체+cuff. ①②=RCC(실질), ④=비종양.","Operation for renal pelvis/ureter urothelial carcinoma?",["Radical nephrectomy","Partial nephrectomy","Radical nephroureterectomy (+whole ureter + bladder cuff)","Simple nephrectomy"],"Urothelial is multifocal → whole ureter + cuff. ①② = RCC (parenchyma), ④ = non-neoplastic."),
 Qi("s1",0,"검체 구성이 옳은 것은?",["Radical nephrectomy = 신장+perinephric fat+Gerota(±부신)","Partial = 신장 전체","Nephroureterectomy = 신장만","Non-neoplastic = 종양+rim"],"radical=신장+fat+Gerota(±부신·LN). ②partial=종양+rim, ③nephroureterectomy=신장+요관 전체+cuff, ④non-neoplastic=병든 신장.","Which specimen composition is correct?",["Radical nephrectomy = kidney + perinephric fat + Gerota (±adrenal)","Partial = whole kidney","Nephroureterectomy = kidney only","Non-neoplastic = tumor + rim"],"Radical = kidney + fat + Gerota (±adrenal/LN). ② partial = tumor + rim, ③ nephroureterectomy = kidney + whole ureter + cuff, ④ non-neoplastic = the diseased kidney."),
 Qi("s1",1,"Partial nephrectomy가 radical과 다른 점?",["더 많이 뗌","nephron-sparing(종양+rim), deep margin 핵심","urothelial용","부신 포함"],"partial=신장 보존, deep parenchymal margin이 잔존 좌우. ①틀림, ③urothelial 아님, ④부신은 radical.","How does partial nephrectomy differ from radical?",["Removes more","Nephron-sparing (tumor+rim); deep margin is key","For urothelial","Includes adrenal"],"Partial spares nephrons; the deep parenchymal margin governs residual tumor. ① wrong, ③ not urothelial, ④ adrenal is radical."),
 Qi("s2",1,"RCC radical nephrectomy에서 perinephric fat를 벗기지 않는 이유?",["무게","perinephric/sinus fat 침범=pT3a라 보존","고정","요관 찾기"],"fat 침범=pT3a. 벗기면 staging 불가. capsule도 보존.","Why not strip the perinephric fat in an RCC radical nephrectomy?",["Weight","Perinephric/sinus fat invasion = pT3a, so keep it","Fixation","To find the ureter"],"Fat invasion = pT3a; stripping it destroys staging. Keep the capsule too."),
 Qi("s2",1,"Partial nephrectomy에서 deep parenchymal margin을 검정으로 칠하고 가장 중시하는 이유?",["가장 큼","남은 신장에 종양 잔존 여부","요관 근접","고정"],"deep(incised) margin=환자 몸에 남는 신장 경계. 양성=잔존→재절제. capsular=green.","Why is the deep parenchymal margin (inked black) the key margin in partial nephrectomy?",["Largest","Residual tumor in the retained kidney","Near the ureter","Fixation"],"It is the incised plane into the kidney left in the patient; positive = residual → re-excision. Capsular = green."),
 Qi("s2",1,"Nephroureterectomy에서 점막을 문지르지 않는 이유?",["색 변화","urothelial friable + urothelium denude → CIS 위음성","무게","고정"],"문지르면 CIS 벗겨짐(위음성)+인공 확산.","Why avoid rubbing the mucosa in nephroureterectomy?",["Color","Friable urothelial + denuded urothelium → CIS underdiagnosis","Weight","Fixation"],"Rubbing strips CIS (false-negative) and smears tumor artifactually."),
 Qi("s2",1,"Radical nephrectomy에서 제출하는 margin은?",["Deep parenchymal margin","Ureter·renal artery·renal vein margin","Apical margin","Bladder cuff"],"신장=혈관·요관 margin. ①deep parenchymal=partial, ③apical=전립선/요도, ④bladder cuff=nephroureterectomy.","Which margins are submitted in a radical nephrectomy?",["Deep parenchymal margin","Ureter, renal artery, renal vein margins","Apical margin","Bladder cuff"],"Kidney = vessel/ureter margins. ① deep parenchymal = partial, ③ apical = prostate/urethra, ④ bladder cuff = nephroureterectomy."),
 Qi("s3",1,"RCC 종양 제출 방식은?",["종양 전체 통째","대표 ≥1 cassette/cm + 관계(capsule·fat·sinus·vein·pelvis)","margin만","1개"],"대표 ≥1/cm + staging 관계 절편. entire는 큰 종양 비현실, 관계 절편 필수.","How is an RCC tumor submitted?",["Entirely","Representative ≥1 cassette/cm + relationships (capsule·fat·sinus·vein·pelvis)","Margins only","One block"],"Representative ≥1/cm plus staging-relationship sections. Entire is impractical for big tumors; relationship sections are essential."),
 Qi("s3",1,"Polycystic kidney 샘플 방식은?",["큰 낭 위주","낭 사이 septa의 golden-yellow solid (occult RCC), 총 ≤8 cassette","피막만","hilum만"],"낭성/말기=RCC 위험↑→septa solid 노림, ≤8. ①큰 낭만 보면 RCC 놓침.","How do you sample a polycystic kidney?",["Mostly large cysts","Solid golden-yellow areas in septa (occult RCC), ≤8 cassettes total","Capsule only","Hilum only"],"Cystic/end-stage carry RCC risk → target solid septal areas, ≤8 cassettes. ① sampling only big cysts misses RCC."),
 Qi("s4",1,"Golden-yellow 단면 →?",["Chromophobe RCC","Clear cell RCC","Urothelial carcinoma","Oncocytoma"],"지질 풍부→golden-yellow=clear cell. ①chromophobe=tan-brown 균일, ③urothelial=신우 점막, ④oncocytoma=brown+scar.","Golden-yellow cut surface →?",["Chromophobe RCC","Clear cell RCC","Urothelial carcinoma","Oncocytoma"],"Lipid-rich → golden-yellow = clear cell. ① chromophobe = tan-brown homogeneous, ③ urothelial = pelvic mucosa, ④ oncocytoma = brown + scar."),
 Qi("s4",2,"Brown(mahogany) + 중심 stellate scar, 경계 좋음 →?",["Clear cell RCC","Papillary RCC","Oncocytoma (DDx chromophobe)","Yolk sac"],"brown+central scar=oncocytoma(양성). chromophobe와 겹쳐 육안 단정 금지. ①golden-yellow, ②tan friable.","Brown (mahogany) + central stellate scar, well-circumscribed →?",["Clear cell RCC","Papillary RCC","Oncocytoma (DDx chromophobe)","Yolk sac"],"Brown + central scar = oncocytoma (benign); overlaps chromophobe, never call on gross alone. ① golden-yellow, ② tan friable."),
 Qi("s4",1,"Tan·friable·hemorrhagic·multifocal →?",["Clear cell RCC","Papillary RCC","Chromophobe","Oncocytoma"],"다발성·friable·출혈=papillary(흔히 multifocal/양측). ①golden-yellow, ③tan 균일, ④brown+scar.","Tan, friable, hemorrhagic, multifocal →?",["Clear cell RCC","Papillary RCC","Chromophobe","Oncocytoma"],"Multifocal, friable, hemorrhagic = papillary (often multifocal/bilateral). ① golden-yellow, ③ tan homogeneous, ④ brown + scar."),
 Qi("s4",2,"신우 점막의 papillary/velvety/erythematous 병변 →?",["Clear cell RCC","Oncocytoma","Urothelial carcinoma","Angiomyolipoma"],"신우 점막의 papillary/velvety=urothelial → 실질 종양 아님, nephroureterectomy 전환.","Papillary/velvety/erythematous lesion of the renal pelvis mucosa →?",["Clear cell RCC","Oncocytoma","Urothelial carcinoma","Angiomyolipoma"],"Pelvic-mucosa papillary/velvety = urothelial (not a parenchymal tumor) → switch to nephroureterectomy."),
 Qi("s5",0,"RCC ≤7cm, 신장 국한 = ?",["pT1 (a≤4 / b>4–7cm)","pT2","pT3a","pT4"],"국한+크기. ②>7cm, ③vein/fat, ④Gerota 넘음.","RCC ≤7 cm, confined to kidney = ?",["pT1 (a≤4 / b>4–7 cm)","pT2","pT3a","pT4"],"Confined, by size. ② >7 cm, ③ vein/fat, ④ beyond Gerota."),
 Qi("s5",1,"RCC >7cm, 신장 국한 = ?",["pT1b","pT2 (a>7–10 / b>10cm)","pT3a","pT4"],"여전히 국한, 7cm 넘어 pT2.","RCC >7 cm, confined = ?",["pT1b","pT2 (a>7–10 / b>10 cm)","pT3a","pT4"],"Still confined, above 7 cm = pT2."),
 Qi("s5",1,"신정맥, 또는 perinephric/sinus fat, 또는 pelvicalyceal 침범 = ?",["pT2","pT3a","pT3b","pT4"],"Gerota 내 국소확장(정맥분지·fat·집합계)=pT3a. IVC 위로=pT3b/c.","Renal vein, OR perinephric/sinus fat, OR pelvicalyceal invasion = ?",["pT2","pT3a","pT3b","pT4"],"Local extension within Gerota (vein branches, fat, collecting system) = pT3a. IVC higher up = pT3b/c."),
 Qi("s5",3,"Gerota's fascia를 넘거나 동측 부신 직접 침범 = ?",["pT3a","pT3b","pT3c","pT4"],"Gerota 막 넘거나 부신 직접침범=최고 국소병기 pT4.","Beyond Gerota's fascia or direct ipsilateral adrenal invasion = ?",["pT3a","pT3b","pT3c","pT4"],"Breaching Gerota or direct adrenal invasion = pT4 (most locally advanced).")
],
"Bladder":[
 Qi("s1",1,"TURBT는 cystectomy와 목적이 다른데, 반드시 포함돼야 하는 것은?",["완치술이라 요건 없음","진단/병기 절제 — muscularis propria 포함 필수","방광 전체 제거","동일"],"TURBT=진단/병기, MP 있어야 MIBC(T2) 판정, 없으면 re-TUR. ①완치 아님, ③전체 제거 아님.","TURBT differs in purpose from cystectomy — what must it include?",["A cure; no requirement","A diagnostic/staging resection — must include muscularis propria","Removes whole bladder","Identical"],"TURBT = diagnostic/staging; MP must be present to call MIBC (T2), else re-TUR. ① not a cure, ③ not whole-bladder removal."),
 Qi("s1",1,"여성 radical cystectomy(anterior exenteration)가 추가로 떼는 것은?",["전립선","자궁·부속기·앞질벽","직장","추가 없음"],"여성=자궁·부속기+앞질벽(남성은 전립선+SV). 방광 뒤 인접 구조.","A female radical cystectomy (anterior exenteration) also removes?",["Prostate","Uterus/adnexa + anterior vaginal wall","Rectum","Nothing extra"],"Female = uterus/adnexa + anterior vaginal wall (male = prostate + SVs) — structures just posterior to the bladder."),
 Qi("s1",1,"Partial cystectomy는 언제?",["미만성 CIS","dome/anterior wall 단일 종양 (전층 + margin)","아무 종양","절대 안 함"],"단일 dome/전벽 종양(trigone·요관구서 멀어 전층 절제 가능). CIS는 미만성이라 부적합.","When is a partial cystectomy appropriate?",["Diffuse CIS","Solitary dome/anterior-wall tumor (full-thickness + margins)","Any tumor","Never"],"Solitary dome/anterior tumor (away from trigone/orifices, allowing full-thickness excision). CIS is diffuse → unsuitable."),
 Qi("s2",1,"종양/점막을 문지르지 않는 이유?",["색 변화","friable + CIS denude (위음성·인공 확산)","무게","고정"],"papillary friable+CIS 벗겨짐→위음성·인공 확산.","Why not rub the tumor/mucosa?",["Color","Friable + CIS denudation (false-negative, artifactual spread)","Weight","Fixation"],"Papillary tumors are friable and CIS strips off → false-negative + artifactual spread."),
 Qi("s2",1,"요관에 probe가 방광으로 안 통과(not probe-patent)하면?",["정상","요관구 주변 종양","결석만","고정 부족"],"probe 안 통과=요관구 주변 종양 거의 확실(그로싱 임상 단서).","A ureter that is not 'probe-patent' suggests?",["Normal","Tumor around the ureteral orifice","Stone only","Underfixation"],"Almost certainly tumor around that orifice — a clue caught at grossing."),
 Qi("s2",1,"방광을 기본 anterior Y로 열고, 후면으로 가는 경우는?",["무작위","앞벽=장기 없음→기본 / 앞쪽 종양·자궁부착 시 후면","후면이 항상","시간"],"앞벽 organ-free→trigone·요관구·후방장기 보존. 앞쪽 종양 관통 피하거나 자궁부착 시 후면.","Default anterior Y-incision — when go posterior?",["Random","Anterior wall is organ-free (default) / posterior if anterior tumor or uterus attached","Posterior always","To save time"],"Anterior is organ-free, preserving trigone/orifices/posterior organs. Reroute posterior to avoid an anterior tumor or to display the uterus/vagina interface."),
 Qi("s2",2,"Radical cystoprostatectomy에서 존재하지 않는 margin은?",["Distal urethral","Ureteral","Bladder neck","Soft tissue"],"전립선이 방광과 함께→bladder neck margin 없음. 대신 방광종양–전립선 관계 기록.","Which margin does NOT exist in a radical cystoprostatectomy?",["Distal urethral","Ureteral","Bladder neck","Soft tissue"],"Prostate removed with bladder → no bladder neck margin. Instead, document the tumor–prostate relationship."),
 Qi("s3",0,"종양 제출 — entire vs representative?",["≤5 cassette면 종양 전체, 아니면 1/cm(최소5)","항상 대표 2개","margin만","안 냄"],"종양은 침윤 깊이 평가 위해 충분히. 정상 점막은 부위별 대표.","Bladder tumor — entire vs representative?",["Entire if ≤5 cassettes, else 1/cm (min 5)","Always 2 representative","Margins only","Not submitted"],"The tumor is sampled enough to assess depth; 'normal' mucosa is sampled representatively by region."),
 Qi("s3",1,"대표 '정상' 점막을 어디서 제출?",["dome만","trigone·전후측벽·dome·UVJ·요도방광접합","trigone만","없음"],"방광암 multifocal·CIS 평면이라 요로 전체 매핑(특히 UVJ·요도접합).","Representative 'normal' mucosa from where?",["Dome only","Trigone, walls, dome, UVJs, urethrovesical junction","Trigone only","None"],"Bladder cancer is multifocal and CIS is flat → map the whole urothelium (esp. the UVJs and urethral junction)."),
 Qi("s4",1,"Exophytic, 유두상(papillary frond) 종괴 →?",["평평 erythematous patch","exophytic papillary frond = papillary urothelial CA","ulcer","정상"],"유두상 frond=papillary urothelial. ①평평 erythematous/velvety=CIS, ③궤양=고등급/침윤 가능.","Exophytic, papillary frond mass →?",["Flat erythematous patch","Exophytic papillary frond = papillary urothelial CA","Ulcer","Normal"],"Papillary fronds = papillary urothelial CA. ① flat erythematous/velvety = CIS, ③ ulcer = high-grade/invasive."),
 Qi("s4",1,"평평한 velvety·erythematous patch →?",["papillary mass","flat velvety erythematous patch = CIS","결석","trabeculation"],"평평 erythematous/velvety=CIS(문지르면 denude). ①유두상=papillary, ④trabeculation=폐색.","Flat velvety, erythematous patch →?",["Papillary mass","Flat velvety erythematous patch = CIS","Stone","Trabeculation"],"Flat erythematous/velvety = CIS (denudes if rubbed). ① papillary = exophytic, ④ trabeculation = outlet obstruction."),
 Qi("s5",2,"Lamina propria(상피하 결합조직) 침윤 = ?",["Ta","Tis","T1","T2"],"lamina propria=T1(NMIBC). ①Ta=비침습 유두상, ②Tis=평평 CIS, ④T2=근육.","Invasion of lamina propria (subepithelial CT) = ?",["Ta","Tis","T1","T2"],"Lamina propria = T1 (NMIBC). ① Ta = non-invasive papillary, ② Tis = flat CIS, ④ T2 = muscle."),
 Qi("s5",1,"Muscularis propria 침윤 = ?",["T1","T2 (a내측 / b외측)","T3","Ta"],"근육 침범=T2=MIBC(치료 분기). ①lamina propria, ③fat, ④비침습.","Invasion of muscularis propria = ?",["T1","T2 (a inner / b outer)","T3","Ta"],"Muscle = T2 = MIBC (treatment pivot). ① lamina propria, ③ fat, ④ non-invasive."),
 Qi("s5",2,"Perivesical fat 침윤 = ?",["T1","T2","T3 (a현미경 / b육안)","T4"],"perivesical fat=T3. b는 육안 종괴(extravesical).","Invasion of perivesical fat = ?",["T1","T2","T3 (a micro / b macro)","T4"],"Perivesical fat = T3; b = grossly visible extravesical mass."),
 Qi("s5",2,"전립선 stroma/자궁/질 직접 침범 = ? / 골반·복벽 = ?",["T2 / T3","T3a / T3b","T4a / T4b","Tis / Ta"],"인접장기 직접=T4a, 골반/복벽=T4b. (전립선 stroma 직접만 T4a).","Direct invasion of prostatic stroma/uterus/vagina = ? / pelvic·abdominal wall = ?",["T2 / T3","T3a / T3b","T4a / T4b","Tis / Ta"],"Adjacent organ = T4a, pelvic/abdominal wall = T4b. (Only direct prostatic stromal invasion is T4a.)")
]
};
let lang=(navigator.language||"en").toLowerCase().startsWith("ko")?"ko":"en";
let organ=Object.keys(Q)[0];
const answered={};
const el=id=>document.getElementById(id);
function render(){
 const ui=UI[lang];document.documentElement.lang=lang;
 el("title").textContent=ui.title;el("meta").textContent=ui.meta;el("resetBtn").textContent=ui.reset;el("revealBtn").textContent=ui.reveal;el("langBtn").textContent=ui.lang;el("foot").textContent=ui.foot;
 const tabs=el("tabs");tabs.innerHTML='';
 Object.keys(Q).forEach(o=>{const b=document.createElement('button');b.className='tab'+(o===organ?' active':'');b.textContent=o+' ('+Q[o].length+')';b.onclick=()=>{organ=o;render();};tabs.appendChild(b);});
 answered[organ]=answered[organ]||{};
 const quiz=el("quiz");quiz.innerHTML='';let lastSec=null;
 Q[organ].forEach((item,qi)=>{
  if(item.s!==lastSec){const h=document.createElement('div');h.className='theme';h.textContent=SEC[item.s][lang];quiz.appendChild(h);lastSec=item.s;}
  const L=item[lang];const card=document.createElement('div');card.className='q';
  card.innerHTML='<div class="qtxt">'+(qi+1)+'. '+L.q+'</div>';
  L.o.forEach((opt,oi)=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=opt;btn.onclick=()=>choose(qi,oi,card);card.appendChild(btn);});
  const exp=document.createElement('div');exp.className='exp';exp.innerHTML='<b>'+ui.exp+'</b> '+L.e;card.appendChild(exp);
  if(qi in answered[organ])markCard(card,qi);
  quiz.appendChild(card);
 });
 updateScore();
}
function markCard(card,qi){const item=Q[organ][qi];const opts=card.querySelectorAll('.opt');const pick=answered[organ][qi].pick;
 opts.forEach((b,i)=>{b.disabled=true;if(i===item.a)b.classList.add('correct');if(i===pick&&pick!==item.a)b.classList.add('wrong');});card.querySelector('.exp').classList.add('show');}
function choose(qi,oi,card){if(qi in answered[organ])return;answered[organ][qi]={pick:oi,correct:oi===Q[organ][qi].a};markCard(card,qi);updateScore();}
function updateScore(){const a=answered[organ]||{};const tot=Q[organ].length,done=Object.keys(a).length,correct=Object.values(a).filter(x=>x.correct).length;el("score").innerHTML=organ+' — '+UI[lang].score(done,tot,correct);}
el("resetBtn").onclick=()=>{answered[organ]={};render();};
el("revealBtn").onclick=()=>{document.querySelectorAll('#quiz .q').forEach((card,qi)=>{if(!(qi in answered[organ]))answered[organ][qi]={pick:Q[organ][qi].a,correct:true};markCard(card,qi);});updateScore();};
el("langBtn").onclick=()=>{lang=lang==="ko"?"en":"ko";render();};
render();
</script>
</body>
</html>
